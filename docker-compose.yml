services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz-postgres
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
      POSTGRES_DB: quiz_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d quiz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prisma CLI service (uses builder stage with full deps for migrations, etc.)
  prisma:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://quiz_user:quiz_password@postgres:5432/quiz_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/libs/db/prisma:/app/backend/libs/db/prisma
    profiles:
      - tools

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://quiz_user:quiz_password@postgres:5432/quiz_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KAFKA_BROKERS: kafka:9092
      PUBSUB_EMULATOR_HOST: pubsub:8085
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/node_modules

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-api
    command: ["node", "dist/backend/apps/api/src/main.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://quiz_user:quiz_password@postgres:5432/quiz_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quiz-frontend
    ports:
      - "5173:80"
    depends_on:
      - api

  # Zookeeper - required for Kafka
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.5.0
  #   container_name: quiz-zookeeper
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   ports:
  #     - "2181:2181"

  # # Kafka broker
  # kafka:
  #   image: confluentinc/cp-kafka:7.5.0
  #   container_name: quiz-kafka
  #   depends_on:
  #     - zookeeper
  #   ports:
  #     - "9092:9092"
